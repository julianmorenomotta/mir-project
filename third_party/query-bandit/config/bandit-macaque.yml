seed: 1337
model: ${oc.env:CONFIG_ROOT}/models/bandit-query-pre.yml
trainer: ${oc.env:CONFIG_ROOT}/trainer/default.yml
loss: ${oc.env:CONFIG_ROOT}/losses/both_l1snr.yml
optim: ${oc.env:CONFIG_ROOT}/optim/adam.yml
fast_run: false

# Macaque speaker IDs must exactly match stem filenames 
# (e.g., data/macaque_dataset/train/mixture_xxxx/individual_00.wav).
stems:
  - "target"

data:
  cls: MacaqueDataModule
  data_root: ${oc.env:DATA_ROOT}/macaque_dataset
  batch_size: 1
  effective_batch_size: null
  num_workers: 0

  inference_kwargs:
    chunk_size_seconds: 6.0
    hop_size_seconds: 0.5
    batch_size: 1
    fs: 44100

  train_kwargs:
    speaker_selection: random
    mixture_duration_sec: 10.0
    seed: 1337
  val_kwargs:
    speaker_selection: cycle
    mixture_duration_sec: 10.0
    seed: 1337
  test_kwargs:
    speaker_selection: first
    mixture_duration_sec: 10.0
    seed: 1337
  datamodule_kwargs: {}
